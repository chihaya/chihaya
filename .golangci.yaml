version: "2"
linters:
  enable:
    - bidichk
    - bodyclose
    - errname
    - errorlint
    - goprintffuncname
    - gosec
    - importas
    - makezero
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - staticcheck
    - unconvert
    - wastedassign
    - whitespace
  settings:
    gosec:
      excludes:
        - G404
        - G115
    staticcheck:
      checks:
        - all
        - -SA1019
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/chihaya/chihaya
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
